name: Build Installer (macOS Apple Silicon) 
 
on:
  workflow_dispatch:
 
env:
  PROJECT_PATH: .
  APP_VERSION: 1.0.0
 
jobs:
  build-macos-arm:
    name: Build macOS ARM64 DMG
    runs-on: macos-14
 
    steps:
 
    - name: Checkout sources
      uses: actions/checkout@v4
 
    - name: Setup Temurin JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven
 
    - name: Build JAR
      working-directory: ${{ env.PROJECT_PATH }}
      run: |
        chmod +x mvnw || true
        ./mvnw -B -DskipTests clean package
 
        echo "📦 Target contents:"
        ls -lh target
 
    - name: Download JavaFX SDK (macOS ARM64)
      run: |
       echo "📥 Downloading JavaFX..."
 
       curl -L -o javafx.zip https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_osx-aarch64_bin-sdk.zip
 
       unzip javafx.zip
 
       mv javafx-sdk-21.0.2 openjfx
 
       echo "📦 JavaFX contents:"
       ls -lh openjfx/lib
 
    - name: Create Runtime (jlink)
      working-directory: ${{ env.PROJECT_PATH }}
      run: |
        echo "📦 Creating runtime..."
 
        rm -rf target/scamusica-runtime
 
        JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
        JFX_PATH="./openjfx/lib"
 
        if [ ! -d "$JFX_PATH" ]; then
          echo "❌ JavaFX SDK not found at $JFX_PATH"
          exit 1
        fi
 
        # ❌ remove problematic SWT jar
        rm -f $JFX_PATH/javafx-swt.jar
 
        jlink \
          --module-path "$JAVA_HOME/jmods:$JFX_PATH" \
          --add-modules java.base,java.desktop,java.logging,java.net.http,jdk.crypto.ec,jdk.crypto.cryptoki,javafx.controls,javafx.fxml,javafx.media \
          --output target/scamusica-runtime \
          --strip-debug \
          --no-man-pages \
          --no-header-files \
         --compress=2
 
         # 🔥 CRITICAL FIX
         cp $JFX_PATH/*.dylib target/scamusica-runtime/lib/
 
        echo "📦 Runtime created:"
        ls -lh target/scamusica-runtime
 
    - name: Import SSL certificates
      working-directory: ${{ env.PROJECT_PATH }}
      run: |
        KEYTOOL=target/scamusica-runtime/bin/keytool
        CACERTS=target/scamusica-runtime/lib/security/cacerts
        STOREPASS=changeit
 
        echo "🧹 Cleaning old certs..."
        $KEYTOOL -delete -alias cis-root -keystore $CACERTS -storepass $STOREPASS || true
        $KEYTOOL -delete -alias new-cert-1 -keystore $CACERTS -storepass $STOREPASS || true
        $KEYTOOL -delete -alias new-cert-2 -keystore $CACERTS -storepass $STOREPASS || true
 
        echo "📥 Importing certs..."
 
        $KEYTOOL -importcert -alias cis-root \
          -file "certs/ca 9.crt" \
          -keystore $CACERTS -storepass $STOREPASS -noprompt
 
        $KEYTOOL -importcert -alias new-cert-1 \
          -file "certs/ca-10.crt" \
          -keystore $CACERTS -storepass $STOREPASS -noprompt
 
        $KEYTOOL -importcert -alias new-cert-2 \
          -file "certs/Fortinet_CA_SSLProxy_new-7.cer" \
          -keystore $CACERTS -storepass $STOREPASS -noprompt
 
        echo "✅ Certificates imported"
 
    - name: Verify certificates
      run: |
        keytool -list \
          -keystore target/scamusica-runtime/lib/security/cacerts \
          -storepass changeit | grep -E "cis-root|new-cert-1|new-cert-2"
 
    - name: Package DMG
      working-directory: ${{ env.PROJECT_PATH }}
      run: |
        # ✅ Safe jar selection
        JAR_NAME=$(ls target/Scamusica-*.jar | grep -v original | head -1 | xargs basename)
 
        if [ -z "$JAR_NAME" ]; then
          echo "❌ JAR not found"
          exit 1
        fi
 
        echo "✅ Using JAR: $JAR_NAME"
 
        jpackage \
          --type dmg \
          --dest target \
          --name Scamusica \
          --input target \
          --main-jar "$JAR_NAME" \
          --main-class com.musicplayer.scamusica.Main \
          --runtime-image target/scamusica-runtime \
          --icon src/main/resources/scamusica.icns \
          --mac-package-name Scamusica \
          --mac-package-identifier com.scamusica.player \
          --java-options "-Dhttps.protocols=TLSv1.2,TLSv1.3, -Dprism.order=sw"
 
        echo "📦 DMG created:"
        ls -lh target/*.dmg
 
    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: scamusica-macos-arm
        path: target/*.dmg
        retention-days: 30


      
          
